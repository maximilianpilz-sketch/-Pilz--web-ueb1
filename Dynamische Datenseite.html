<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Name</title>
</head>
<body>
    <ul id="liste-linz"></ul>
        <script>
  // Lokale Daten
  const stadtteile = ["Urfahr", "Innere Stadt", "Bindermichel", "Maximilian", "Ingeborg"];
  const liste = document.getElementById("liste-linz");
  stadtteile.forEach(s => {
    let li = document.createElement("li");
    li.textContent = s;
    liste.appendChild(li);
  });
        </script>
    <ul id="service-linz"></ul>
          <script> 
        // Daten vom Server laden (Servicecall)
  fetch('https://jsonplaceholder.typicode.com/users')
    .then(response => response.json()) // Antwort in JSON umwandeln
    .then(data => {
      const sListe = document.getElementById("service-liste");
      data.forEach(user => {
        let li = document.createElement("li");
        li.textContent = "User: " + user.name; // Wir greifen auf das Feld 'name' zu
        sListe.appendChild(li);
      });
    });
        </script>
</body>
</html>
